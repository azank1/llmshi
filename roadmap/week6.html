<script src="js/lecture.js"></script>
<script>
renderSlides('slides', [
  ['Predicting the Next Word','Core task: given sequence, predict what comes next — foundation of language models'],
  ['Probability of a Word','P(w) in context — how likely is this word given what came before?'],
  ['Probability Theory Review','Sum rule: P(A) = ΣP(A,B). Product rule: P(A,B) = P(A|B)P(B)'],
  ['Sum Rule &amp; Product Rule','Building blocks for all probabilistic language modeling'],
  ['Bayes\' Theorem','posterior ∝ likelihood × prior — basis for inference'],
  ['Shannon\'s Language Model (1948)','Language as a stochastic process — probabilistic character/word generation'],
  ['Markov Process','Future depends only on present state, not full history'],
  ['Shannon\'s Generated Text','Zero-order: random letters. First-order: letter frequencies. Second-order: bigram frequencies'],
  ['Shannon\'s Word Models','First-order word model produces semi-coherent text from word frequencies'],
  ['N-grams Defined','Sequence of N consecutive words — inspired by Shannon\'s probabilistic approach'],
  ['Types: Unigram, Bigram, Trigram','Unigrams: single words. Bigrams: word pairs. Trigrams: word triples'],
  ['N-gram Probability','P(wₙ|w₁...wₙ₋₁) ≈ P(wₙ|wₙ₋ₖ₊₁...wₙ₋₁) — Markov assumption'],
  ['Estimating Unigram Probabilities','P(w) = count(w) / total_words'],
  ['Estimating Bigram Probabilities','P(wₙ|wₙ₋₁) = count(wₙ₋₁,wₙ) / count(wₙ₋₁)'],
  ['Sparse Data Issues','Many valid bigrams/trigrams have zero count in training corpus'],
  ['Smoothing','Add-one (Laplace), Add-k, Backoff, Interpolation — handle zero counts']
]);

renderMath('math', [
  {name:'Chain Rule of Probability', formula:'P(w₁,w₂,...,wₙ) = P(w₁)·P(w₂|w₁)·P(w₃|w₁,w₂)·...·P(wₙ|w₁...wₙ₋₁)', desc:'Exact decomposition — impractical for long sequences'},
  {name:'Markov Assumption (Bigram)', formula:'P(wₙ|w₁...wₙ₋₁) ≈ P(wₙ|wₙ₋₁)', desc:'Only previous word matters — makes computation feasible'},
  {name:'Bigram MLE', formula:'P(wₙ|wₙ₋₁) = count(wₙ₋₁, wₙ) / count(wₙ₋₁)', desc:'Maximum likelihood estimate from corpus counts'},
  {name:'Trigram MLE', formula:'P(wₙ|wₙ₋₂,wₙ₋₁) = count(wₙ₋₂,wₙ₋₁,wₙ) / count(wₙ₋₂,wₙ₋₁)', desc:'Previous two words — better context, sparser counts'},
  {name:'Laplace Smoothing', formula:'P(wₙ|wₙ₋₁) = (count(wₙ₋₁,wₙ) + 1) / (count(wₙ₋₁) + V)', desc:'Add 1 to all counts, V to denominator — no zero probabilities'},
  {name:'Perplexity', formula:'PP(W) = P(w₁...wₙ)^(-1/n) = exp(-1/n · Σ log P(wᵢ|context))', desc:'Lower = better model. Intuition: average branching factor'},
  {name:'Bayes\' Theorem', formula:'P(A|B) = P(B|A) · P(A) / P(B)', desc:'Update belief about A given evidence B'}
]);

renderDryRun('dryrun', [
  {
    title: 'Bigram Probabilities from corpus: "I am Sam. Sam I am. I do not like green eggs and ham."',
    steps: [
      'Count bigrams: (I,am)=2, (am,Sam)=1, (Sam,I)=1, (I,do)=1, (do,not)=1, ...',
      'Count unigrams: I=3, am=2, Sam=2, do=1, not=1, ...',
      'P(am|I) = count(I,am)/count(I) = 2/3 = 0.667',
      'P(Sam|am) = count(am,Sam)/count(am) = 1/2 = 0.5',
      'P(do|I) = count(I,do)/count(I) = 1/3 = 0.333'
    ],
    result: 'Given "I", model predicts "am" (67%) over "do" (33%). Bigram captures local patterns.'
  },
  {
    title: 'Laplace Smoothing: P("like"|"not") with V=12',
    steps: [
      'Without smoothing: count("not","like")=1, count("not")=1 → P=1/1=1.0',
      'Problem: model is 100% certain — overconfident!',
      'With Laplace: P = (1+1)/(1+12) = 2/13 = 0.154',
      'Now unseen bigrams get: P = (0+1)/(1+12) = 1/13 = 0.077',
      'All bigrams starting with "not" sum to 1.0 ✓'
    ],
    result: 'Smoothing redistributes probability mass from seen to unseen events.'
  },
  {
    title: 'Perplexity: Evaluate bigram model on test "I am Sam"',
    steps: [
      'P(I|&lt;s&gt;) = 0.5 (assume), P(am|I) = 0.667, P(Sam|am) = 0.5',
      'P(sentence) = 0.5 × 0.667 × 0.5 = 0.167',
      'log P = log(0.5) + log(0.667) + log(0.5) = -0.301 + (-0.176) + (-0.301) = -0.778',
      'PP = P^(-1/3) = 0.167^(-1/3) = (1/0.167)^(1/3) = 5.99^(1/3) ≈ 1.82'
    ],
    result: 'Perplexity ≈ 1.82. Lower = better. A random model over V=12 words would give PP=12.'
  }
]);

renderExercises('exercises', [
  {q:'The Markov assumption for bigrams states:', options:['All words are independent','Next word depends only on previous word','Next word depends on all previous words','Words have fixed probabilities'], correct:1, explanation:'Bigram Markov: P(wₙ|w₁...wₙ₋₁) ≈ P(wₙ|wₙ₋₁)'},
  {q:'Why is Laplace smoothing needed?', options:['To speed up training','To handle unseen n-grams that have zero probability','To reduce vocabulary','To improve grammar'], correct:1, explanation:'Without smoothing, any unseen bigram gives P=0, making entire sentence probability 0.'},
  {q:'Perplexity of a perfect model that always predicts correctly would be:', options:['0','1','Infinity','Vocabulary size'], correct:1, explanation:'Perfect prediction: P=1 at each step, PP = 1^(-1/n) = 1.'},
  {q:'Compute: P("won"|"team") from corpus "team won match team lost game team won cup"', answer:'count("team","won") = 2, count("team") = 3. P("won"|"team") = 2/3 ≈ 0.667'},
  {q:'With Laplace smoothing (V=6), recompute P("won"|"team")', answer:'P = (2+1)/(3+6) = 3/9 = 0.333. Smoothing reduced from 0.667 to 0.333 — mass redistributed to unseen bigrams.'}
]);

renderChecklist('checklist', [
  'State the chain rule of probability for sentences',
  'Explain the Markov assumption and why it\'s needed',
  'Calculate bigram probabilities from a corpus by hand',
  'Apply Laplace smoothing and explain what happens',
  'Compute perplexity and interpret the result',
  'Know Shannon\'s language generation model',
  'Understand the sparse data problem in n-grams'
], 'w6');
</script>
