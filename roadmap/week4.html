<script>
renderSlides('slides', [
  {title:'What is a Workflow?', body:'A workflow is an ordered sequence of steps that transforms an input into an output.', points:['Defines <strong>when</strong> and <strong>how</strong> models, tools, and logic are used','Developer designs the flow; system follows the steps deterministically','Examples: data pipeline, CI/CD, document processing','<strong>Key distinction:</strong> workflows are <em>predefined</em> — the developer writes the control flow'], note:'Understanding basic workflows is essential before moving to the more complex agentic paradigm.'},
  {title:'Motivation for Agents', body:'Real-world complex tasks require iterative, adaptive approaches — not single-shot inference:', points:['How do we work on programming assignments? Research → Plan → Code → Debug → Iterate → Submit','How do we write research papers? Read literature → Outline → Draft → Revise → Submit','These are inherently <strong>agentic flows</strong> — iterative cycles with decision-making','Plain LLMs cannot do this: single-turn, no memory, no tools, no goal-tracking']},
  {title:'Plain LLMs vs Agentic Workflows', body:'The fundamental difference between LLM calls and agent loops:', points:['<strong>LLM Workflow:</strong> Input → LLM → Output (linear, predefined, developer-controlled)','<strong>Agentic Workflow:</strong> Goal → Plan → Act → Observe → Reflect → Repeat (iterative, dynamic, agent-controlled)','LLM: one-shot, deterministic path. Agent: multi-step, adaptive path.','The agent decides what to do next based on observations — not the developer']},
  {title:'HuggingGPT — A Pioneering Multi-Model Agent', body:'HuggingGPT (Shen et al., 2023) uses ChatGPT as a controller that dispatches to specialized HuggingFace models.', points:['<strong>Stage 1 — Task Planning:</strong> LLM decomposes user request into subtasks','<strong>Stage 2 — Model Selection:</strong> For each subtask, pick the best specialized model from HuggingFace','<strong>Stage 3 — Task Execution:</strong> Run each selected model on its subtask','<strong>Stage 4 — Response Generation:</strong> Aggregate all results into final response','Key finding: needs a strong LLM coordinator to plan and reason for complex tasks'], note:'HuggingGPT was evaluated on single tasks, sequential tasks, and graph-structured tasks.'},
  {title:'What is an AI Agent?', body:'An AI Agent is an LLM equipped with tools, memory, and a decision loop to act toward a goal.', points:['<strong>LLM:</strong> The model powering reasoning and decision-making','<strong>Tools:</strong> Functions or external APIs the agent can invoke (search, calculator, database, etc.)','<strong>Memory:</strong> Short-term (conversation) and long-term (persistent knowledge store)','<strong>Control Loop:</strong> Repeating cycle: decide → act → observe → decide again until goal is met','<strong>Prompt/Instructions:</strong> Explicit guidelines defining agent behavior, constraints, persona']},
  {title:'Core Agent Loop — The ReAct Pattern', body:'The most common agent architecture: Reasoning + Acting in an iterative loop.', points:['<strong>Step 1 — Receive Goal:</strong> "Find the cheapest flight from Islamabad to Dubai next week"','<strong>Step 2 — Think:</strong> "I need to search for flights. Let me use the flight search tool."','<strong>Step 3 — Act:</strong> Execute search_flights(from="ISB", to="DXB", date="next week")','<strong>Step 4 — Observe:</strong> "Found 5 flights. Cheapest is PIA PK-211 at $320."','<strong>Step 5 — Think:</strong> "I have the answer. Let me respond."','<strong>Step 6 — Final Answer:</strong> "The cheapest flight is PIA PK-211 at $320, departing Tuesday."'], note:'The loop continues until: goal achieved, max iterations reached, or failure condition met.'},
  {title:'Multi-Agent Systems', body:'Multiple specialized agents collaborating on complex tasks:', points:['<strong>Individual Agent:</strong> Single LLM + tools focused on one capability','<strong>Multi-Agent System:</strong> Multiple agents with different roles working together','Examples: Philosophers debating, online collaborative painting, code review teams','<strong>Key challenge:</strong> Training agents to collaborate efficiently with clear division of labor','Avoiding conflicts and contradictions between agents is critical']},
  {title:'Multi-Agent Collaboration Patterns', body:'How agents work together effectively:', points:['<strong>Collaboration:</strong> Multiple agents interact to complete complex tasks jointly','<strong>Debate:</strong> Agents argue different positions, converging on best solution','<strong>Division of Labor:</strong> Each agent specializes — e.g., doctor + nurse for diagnosis','<strong>Review Loop:</strong> One agent creates, another reviews, iterate until quality threshold met','Future: multi-agent systems exceeding individual agent capabilities']},
  {title:'What is Agentic AI?', body:'Agentic AI is a system of multiple agents that collaborate, plan, and execute tasks autonomously.', points:['<strong>Multiple agents</strong> with specialized roles','<strong>Delegation:</strong> Agents can assign subtasks to other agents','<strong>Long-term goals:</strong> Can maintain objectives across many interactions','<strong>Self-correction:</strong> Detect errors and adapt strategy','Evolution: LLMs → RAG → AI Agent → Agentic AI (increasing autonomy and complexity)']},
  {title:'Agentic Frameworks', body:'Software frameworks that help build, manage, and control AI agents and workflows:', points:['<strong>Why they exist:</strong> Agent logic is complex; manual implementation is error-prone','<strong>LangChain:</strong> Chains of LLM calls + tools + memory','<strong>LangGraph:</strong> Graph-based workflow with conditional routing and state management','<strong>CrewAI:</strong> Role-based multi-agent framework with delegation','<strong>AutoGen (Microsoft):</strong> Multi-agent conversations with human-in-the-loop','All provide: tool orchestration, state handling, control loops, multi-agent coordination, debugging']},
  {title:'MCP — Model Context Protocol', body:'Anthropic\'s standard for tool communication with agents:', points:['<strong>Purpose:</strong> Standardize how agents discover, invoke, and receive results from tools','Provides a universal interface so agents work with any MCP-compatible tool','Includes tool descriptions, parameter schemas, and result formatting','Enables tool ecosystems — build once, use with any MCP-supporting agent']},
  {title:'A2A — Agent to Agent Protocol', body:'Google\'s protocol for inter-agent communication:', points:['<strong>Purpose:</strong> Standardize how agents discover and communicate with each other','Enables agents built by different teams/frameworks to collaborate','Includes agent discovery, capability negotiation, task delegation','Complement to MCP: MCP is agent↔tool, A2A is agent↔agent']},
  {title:'Debugging Agentic Systems', body:'Why debugging agents is fundamentally harder than debugging traditional software:', points:['Multiple LLM calls = multiple points of non-deterministic failure','Tool failures can cascade unpredictably through the agent loop','Prompt sensitivity: small changes can completely alter agent behavior','Need <strong>observability:</strong> trace each thought, action, observation, decision','<strong>LangSmith, Weights &amp; Biases, Arize:</strong> Tools for agent tracing and debugging']}
]);

]);

renderMath('math', [
  {name:'ReAct Pattern', formula:'Thought → Action → Observation → Thought → ... → Final Answer', desc:'Reasoning + Acting loop — model alternates between thinking and tool use until goal is met.'},
  {name:'Agent Decision Function', formula:'actionₜ = LLM(goal, history₁..ₜ₋₁, available_tools)', desc:'At each step, the agent decides the next action based on its goal, accumulated observations, and available tools.'},
  {name:'Tool Schema (JSON)', formula:'{"name":"search", "params":{"query":"string"}, "returns":"string"}', desc:'Standardized JSON schema defining a tool interface — enables the LLM to understand what tools are available and how to call them.'},
  {name:'Orchestration Cost', formula:'Total Cost = Σ(LLM_calls × tokens_per_call × cost_per_token) + Σ(tool_execution_costs)', desc:'Multi-agent workflows multiply API costs — need budgeting and cost-awareness. A 5-agent pipeline may cost 5-20× a single LLM call.'},
  {name:'Agent Loop Termination', formula:'STOP if: goal_achieved OR iterations > max_iterations OR error_count > threshold', desc:'Agents must have clear stopping conditions to prevent infinite loops and runaway costs.'}
]);

renderDryRun('dryrun', [
  {
    title: 'ReAct Agent: "What is 25 × 47 + the population of Islamabad?"',
    steps: [
      'GOAL: Compute 25×47 + population of Islamabad',
      'THOUGHT 1: I need to multiply 25×47 first.',
      'ACTION 1: calculator(25 * 47)',
      'OBSERVATION 1: 1175',
      'THOUGHT 2: Now I need Islamabad\'s population.',
      'ACTION 2: search("population of Islamabad 2024")',
      'OBSERVATION 2: ~2.4 million (2,400,000)',
      'THOUGHT 3: Now add them together.',
      'ACTION 3: calculator(1175 + 2400000)',

      'FINAL ANSWER: 25 × 47 + population of Islamabad ≈ 2,401,175'
    ],

  },
  {

      'AGENT 3 (Reviewer): re-reads → approves → publish',
      'TOTAL: 5 agent invocations across 3 agents'
    ],
    result: 'Sequential orchestration with a conditional review loop. The review loop added 2 extra invocations.'
  },
  {

      'TASK EXECUTION: Run BLIP-2 → "A cat sitting on a laptop". Run TrOCR → "Hello World"',

  {

renderExercises('exercises', [
  {q:'What are the 3 key components of an AI Agent beyond the LLM?', options:['Data, GPU, API','Tools, Memory, Decision Loop','Frontend, Backend, Database','Encoder, Decoder, Attention'], correct:1, explanation:'Agent = LLM + Tools + Memory + Decision Loop. The LLM is the brain; tools are the hands; memory is the notebook; the loop is the workflow.'},
  {q:'In the ReAct pattern, what alternates?', options:['Training and testing','Encoding and decoding','Reasoning (Thought) and Acting (Tool use)','Reading and writing'], correct:2, explanation:'ReAct = Reasoning + Acting. The agent thinks about what to do, then does it, then observes the result, then thinks again.'},
  {q:'What is MCP?', options:['Multi-Channel Processing','Model Context Protocol','Machine Code Parser','Memory Cache Protocol'], correct:1, explanation:'Anthropic\'s Model Context Protocol standardizes tool communication with agents.'},
  {q:'Name the 4 stages of HuggingGPT', answer:'1) Task Planning — decompose request into subtasks. 2) Model Selection — pick best specialist model for each subtask. 3) Task Execution — run each model. 4) Response Generation — aggregate all results into final response.'},
  {q:'Design a 2-agent code review system', answer:'Agent 1 (Coder): Receives task → writes Python code. Agent 2 (Reviewer): Reads code → runs linter/tests → provides line-by-line feedback. Routing: If Reviewer finds issues → back to Coder with feedback. If all tests pass → END. Implementation: LangGraph with conditional edges based on test results.'},
  {q:'What distinguishes Agentic AI from a single AI Agent?', options:['More parameters','Multiple agents collaborating with delegation and self-correction','Faster inference','Better training data'], correct:1, explanation:'Agentic AI = system of multiple agents that collaborate, delegate, pursue long-term goals, and self-correct.'},
  {q:'Why is debugging agents harder than debugging traditional software?', answer:'1) Non-deterministic LLM outputs — same input can produce different actions. 2) Multiple chained calls — failure can cascade. 3) Tool failures are unpredictable. 4) Prompt sensitivity — small prompt changes alter behavior. 5) Need full trace logging (observability) to diagnose issues.'},
  {q:'Compare MCP and A2A protocols', answer:'MCP (Anthropic): standardizes agent↔tool communication — tool discovery, invocation, results. A2A (Google): standardizes agent↔agent communication — agent discovery, capability negotiation, task delegation. They are complementary: MCP for using tools, A2A for agent collaboration.'}
]);
