<script>
renderSlides('slides', [
  {title:'From Sparse to Dense: Why Prediction-based Embeddings?', body:'Count-based methods (TF-IDF, co-occurrence matrices) produce sparse, high-dimensional vectors. Prediction-based models learn dense embeddings directly.', points:['<strong>TF-IDF / One-hot:</strong> V-dimensional sparse vectors → 50,000+ dimensions, mostly zeros','<strong>Co-occurrence + SVD:</strong> Dense but ignores word ordering and requires expensive factorization','<strong>Prediction-based (Word2Vec):</strong> Dense d-dimensional vectors (d=100-300); learned by neural network','Key insight: "You shall know a word by the company it keeps" (Firth, 1957)','Result: words in similar contexts → similar vectors → capture semantic meaning','<strong>Impact:</strong> Word2Vec (Mikolov et al., 2013) — trained on Google News (100B words, 3M vocab)'], note:'Word2Vec made high-quality embeddings practical. Before this, most NLP used sparse bag-of-words features.'},
  {title:'Word2Vec: Two Architectures', body:'Word2Vec provides two complementary approaches — both use a shallow (1-hidden-layer) neural network:', points:['<strong>Skip-gram:</strong> given center word → predict surrounding context words','<strong>CBOW (Continuous Bag of Words):</strong> given context words → predict center word','Both have ONE hidden layer with NO activation function (linear transformation only!)','The hidden layer weights become the word embedding matrix W₁ ∈ ℝ^{V×d}','<strong>Skip-gram:</strong> slower, better for rare words, works well on small data','<strong>CBOW:</strong> faster (one prediction per position), better for frequent words','Both produce similar quality embeddings; choice depends on use case']},
  {title:'Skip-gram Architecture — Layer by Layer', body:'The Skip-gram neural network predicts context from center word:', points:['<strong>Input layer:</strong> one-hot vector x ∈ ℝ^V (dimension = vocabulary size)','<strong>W₁ (V×d):</strong> input embedding matrix. x × W₁ = just selects row i → this IS the embedding!','<strong>Hidden layer:</strong> h = W₁[i] ∈ ℝ^d (d-dimensional, NO activation function, NO bias)','<strong>W₂ (d×V):</strong> context embedding matrix. Scores = h × W₂ ∈ ℝ^V','<strong>Output layer:</strong> softmax(scores) → probability distribution over V words','<strong>Target:</strong> the actual context word should have highest probability','Loss = −log P(context_word | center_word) = cross-entropy'], note:'The "no activation" in the hidden layer is critical — it means the embedding is a direct linear lookup. This is fundamentally different from deeper networks.'},
  {title:'Skip-gram Training Pairs: Sliding Window', body:'From "My favorite PSL team is Lahore Qalandars" with window c=2:', points:['Center="My": context=["favorite","PSL"] → pairs: <strong>(My,favorite), (My,PSL)</strong>','Center="favorite": context=["My","PSL","team"] → <strong>(favorite,My), (favorite,PSL), (favorite,team)</strong>','Center="PSL": context=["My","favorite","team","is"] → <strong>4 pairs</strong>','Center="team": context=["favorite","PSL","is","Lahore"] → <strong>4 pairs</strong>','Center="is": context=["PSL","team","Lahore","Qalandars"] → <strong>4 pairs</strong>','Center="Lahore": context=["team","is","Qalandars"] → <strong>3 pairs</strong>','Center="Qalandars": context=["is","Lahore"] → <strong>2 pairs</strong>','<strong>Total: 22 training pairs</strong> from a 7-word sentence!'], note:'No labels needed — the text IS the supervision signal. This self-supervised approach scales to billions of words.'},
  {title:'CBOW Architecture — Layer by Layer', body:'CBOW reverses the Skip-gram direction: predict center from context words.', points:['<strong>Input:</strong> 2c context word one-hot vectors (for window size c)','<strong>Lookup:</strong> Each context word selects its row from W₁ → 2c embedding vectors','<strong>Average:</strong> v_ctx = (1/2c) Σ W₁[context_j] → single d-dimensional vector','<strong>Hidden:</strong> the averaged context embedding (NO activation, NO bias)','<strong>Output:</strong> softmax(v_ctx × W₂) → predict the center word','<strong>One prediction per position</strong> (vs 2c in Skip-gram) → significantly faster training','Averaging discards word order within the window — hence "bag of words"']},
  {title:'The Embedding Matrix in Detail', body:'After training, the learned weight matrices contain the embeddings:', points:['<strong>W₁ ∈ ℝ^{V×d}</strong> — Target/input embedding matrix. Row i = embedding of word i.','<strong>W₂ ∈ ℝ^{d×V}</strong> — Context/output embedding matrix. Column j = context vector of word j.','W₁ and W₂ learn somewhat different representations','<strong>Options after training:</strong> (a) use W₁ only, (b) use W₂ᵀ only, (c) average W₁ + W₂ᵀ','Most common practice: just use W₁ as the final word embeddings','<strong>Parameter count:</strong> W₁ has V×d params, W₂ has d×V params → total 2×V×d']},
  {title:'Training Objective: Maximum Log-Likelihood', body:'The Skip-gram objective maximizes the probability of observed context words given each center word:', points:['<strong>Objective:</strong> J(θ) = (1/T) Σₜ₌₁ᵀ Σ_{-c≤j≤c, j≠0} log P(wₜ₊ⱼ | wₜ)','T = total words in corpus, c = window size','P(wₒ|wᵢ) = exp(uₒᵀ · vᵢ) / Σₖ₌₁ᵛ exp(uₖᵀ · vᵢ)','uₒ = column of W₂ for output word, vᵢ = row of W₁ for input word','<strong>Computational bottleneck:</strong> denominator requires summing over ALL V words!','For V=50,000: every single training step requires 50,000 exp() computations','<strong>This makes full softmax infeasible</strong> → need approximation'], note:'This bottleneck motivated two solutions: Hierarchical Softmax (using a Huffman tree) and Negative Sampling.'},
  {title:'Negative Sampling — The Key Speedup', body:'Replace the V-way softmax with binary classification: is this pair real or fake?', points:['<strong>Positive pair:</strong> (center, actual_context) → label = 1 → push dot product high','<strong>Negative pairs:</strong> sample K random words as fake context → label = 0 → push dot product low','<strong>Loss:</strong> L = −log σ(uₒᵀvᵢ) − Σₖ₌₁ᴷ log σ(−uₖᵀvᵢ)','σ(x) = 1/(1+e⁻ˣ) = sigmoid function','Only update K+1 output vectors per training step instead of all V!','<strong>Noise distribution:</strong> P(w) ∝ count(w)^{0.75} — sublinear: upweights rare words','<strong>K values:</strong> 5-20 for small datasets, 2-5 for large (Google used K=5 for 100B words)'], note:'Negative sampling reduces each update from O(V) to O(K). With K=5 and V=50,000, this is a 10,000× speedup!'},
  {title:'Subsampling Frequent Words', body:'Very frequent words like "the", "a", "is" provide little useful signal but dominate training:', points:['<strong>Problem:</strong> "the" appears in almost every window → contributes noise, not meaning','<strong>Solution:</strong> Randomly discard frequent words during training with probability based on frequency','<strong>Discard probability:</strong> P(discard) = 1 − √(t / f(w)), where t ≈ 10⁻⁵ and f(w) = word frequency','Words with f(w) > t are increasingly likely to be dropped','A word appearing in 1% of corpus: P(discard) ≈ 96.8%','This speeds training AND improves embedding quality for rare words']},
  {title:'Word2Vec Results: Semantic Arithmetic', body:'The breakthrough result: embeddings capture linear semantic and syntactic relationships:', points:['<strong>Gender:</strong> v(king) − v(man) + v(woman) ≈ v(queen)','<strong>Capital:</strong> v(Paris) − v(France) + v(Italy) ≈ v(Rome)','<strong>Comparative:</strong> v(bigger) − v(big) + v(small) ≈ v(smaller)','<strong>Tense:</strong> v(walked) − v(walking) + v(swimming) ≈ v(swam)','<strong>Plurality:</strong> v(cars) − v(car) + v(apple) ≈ v(apples)','These emerge automatically from training — no explicit supervision!','<strong>Evaluation:</strong> Use cosine similarity to find nearest neighbor: argmax cos(v_result, v_w)'], note:'The Google Word2Vec analogy test had 19,544 questions. Best accuracy: ~75%. Human accuracy on same test: ~80%.'},
  {title:'Cosine Similarity &amp; Word Similarity', body:'How to measure if two word embeddings are similar:', points:['<strong>Cosine similarity:</strong> cos(u,v) = (u · v) / (‖u‖ · ‖v‖) — ranges from -1 to +1','cos = 1: identical direction (synonyms). cos = 0: orthogonal (unrelated). cos = -1: opposite.','Alternative: Euclidean distance ‖u-v‖, but cosine is preferred (invariant to vector magnitude)','<strong>Nearest neighbors of "king":</strong> queen, prince, monarch, ruler, throne','<strong>Nearest neighbors of "Python":</strong> Java, programming, language, code, Ruby','Word similarity benchmarks: WordSim-353, SimLex-999, MEN dataset']},
  {title:'Limitations &amp; Extensions of Word2Vec', body:'Word2Vec has important limitations that later models address:', points:['<strong>Static embeddings:</strong> Each word gets ONE vector regardless of context — "bank" (river) = "bank" (finance)','<strong>Out-of-vocabulary (OOV):</strong> Cannot handle words not seen during training','<strong>No morphology:</strong> "run", "running", "runner" are treated as completely unrelated words','<strong>GloVe (2014):</strong> Combines count-based and prediction-based — global co-occurrence matrix + learning','<strong>FastText (2016):</strong> Learns subword (character n-gram) embeddings → handles OOV and morphology','<strong>ELMo (2018):</strong> Context-dependent embeddings using deep LSTMs','<strong>BERT (2019):</strong> Fully contextual — same word gets different vectors in different contexts']}
]);

]);

renderMath('math', [
  {name:'Skip-gram Objective', formula:'J(θ) = (1/T) Σₜ₌₁ᵀ Σ_{-c≤j≤c, j≠0} log P(wₜ₊ⱼ | wₜ)', desc:'Maximize log probability of context words given center word. T = corpus size, c = window size.'},
  {name:'Softmax Output Probability', formula:'P(wₒ|wᵢ) = exp(uₒᵀ · vᵢ) / Σⱼ₌₁ᵛ exp(uⱼᵀ · vᵢ)', desc:'uₒ = context vector of output word (column of W₂), vᵢ = embedding of input word (row of W₁). Denominator sums over all V words.'},
  {name:'Negative Sampling Loss', formula:'L = −log σ(uₒᵀvᵢ) − Σₖ₌₁ᴷ log σ(−uₖᵀvᵢ)', desc:'Maximize similarity of positive pair, minimize similarity of K negative pairs. Replaces O(V) softmax with O(K) binary classifications.'},
  {name:'Sigmoid Function', formula:'σ(x) = 1 / (1 + e⁻ˣ)', desc:'Maps any real value to [0,1]. Used as probability estimate in negative sampling.'},
  {name:'Negative Sampling Distribution', formula:'P(w) = count(w)^{0.75} / Σ_w count(w)^{0.75}', desc:'Sublinear scaling (exponent 0.75) upweights rare words compared to uniform sampling. Empirically found to work best.'},
  {name:'CBOW Context Vector', formula:'v_ctx = (1/2c) Σⱼ₌₋ₖ^{c, j≠0} v(wₜ₊ⱼ)', desc:'Average of 2c context word embeddings. This average is the input to the output layer.'},
  {name:'Cosine Similarity', formula:'cos(u,v) = (u · v) / (‖u‖ · ‖v‖)', desc:'Measures angle between two vectors. 1 = identical, 0 = orthogonal, -1 = opposite. Standard metric for word similarity.'},
  {name:'Word Analogy', formula:'v(king) − v(man) + v(woman) ≈ v(queen)', desc:'Semantic arithmetic. Find: argmax_w cos(v(king)−v(man)+v(woman), v(w)).'},
  {name:'Subsampling Probability', formula:'P(discard wᵢ) = 1 − √(t / f(wᵢ))', desc:'t ≈ 10⁻⁵. Words with frequency f(w) >> t are frequently discarded during training. Reduces noise from ultra-common words.'},
  {name:'Parameter Count', formula:'Total params = 2 × V × d', desc:'W₁ ∈ ℝ^{V×d} + W₂ ∈ ℝ^{d×V}. For V=50K, d=300: 30M parameters total.'}
]);

renderDryRun('dryrun', [
  {

      'Vocabulary: {My=0, favorite=1, PSL=2, team=3, is=4, Lahore=5, Qalandars=6}. V=7.',

  {

    steps: [
      'One-hot: x = [0, 0, 1, 0, 0, 0, 0]  (index 2 is 1)',

      'h = x · W₁ = row 2 of W₁ = [0.2, -0.5, 0.8]  ← this IS the embedding',
      'W₂ (3×7) maps to scores: z = h · W₂ = [1.2, 0.3, 0.1, -0.8, 0.5, 0.2, -0.4]',
